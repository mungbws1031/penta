<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PENTA — 5중 셀프 프로파일러</title>
  <style>
    :root {
      --gold: #f2ca6e; --gold-glow: rgba(242,202,110,0.16);
      --ink: #f0ecff; --ink-dim: rgba(240,236,255,0.88);
      --muted: #8a86b2; --muted-dim: rgba(138,134,178,0.65);
      --card: rgba(255,255,255,0.046); --border: rgba(255,255,255,0.08);
      --border-hi: rgba(255,255,255,0.14); --surface: rgba(0,0,0,0.22);
      --confirm: #5de8a4; --hidden: #74b8ff; --nurtured: #c47cff;
      --good: #5de8a4; --bad: #ff7676; --mid: #b8b4d8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard", system-ui, -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--ink); line-height: 1.65; min-height: 100vh;
      background:
        radial-gradient(ellipse 90% 55% at 50% -4%, rgba(90,55,175,0.5) 0%, transparent 62%),
        radial-gradient(ellipse 55% 45% at 85% 95%, rgba(55,35,120,0.35) 0%, transparent 52%),
        radial-gradient(ellipse 40% 35% at 5% 50%, rgba(40,25,100,0.25) 0%, transparent 55%),
        linear-gradient(168deg, #0c0920 0%, #151130 48%, #0f0c25 100%);
      background-attachment: fixed;
    }
    .wrap { max-width: 740px; margin: 0 auto; padding: 30px 18px 96px; }

    /* ─── HEADER ─── */
    header.top { text-align: center; margin-bottom: 4px; padding-top: 6px; }
    .logo {
      font-size: 2.75rem; font-weight: 900; letter-spacing: .2em; display: inline-block;
      background: linear-gradient(130deg, #ffffff 25%, #f2ca6e 70%, #ffeaa5 95%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 0 28px rgba(242,202,110,0.25));
    }
    .tagline { color: var(--muted); margin: 5px 0 0; font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; }

    /* ─── NAV ─── */
    .nav { display: flex; gap: 6px; justify-content: center; margin: 22px 0 28px; }
    .nav button {
      flex: 1; max-width: 142px; padding: 10px 8px; border-radius: 999px;
      cursor: pointer; font-size: .88rem; font-weight: 800; letter-spacing: .03em;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--muted);
      transition: all .2s; font-family: inherit;
    }
    .nav button.active {
      color: #16112e; background: linear-gradient(90deg, #f2ca6e, #ffe08a);
      border-color: transparent; box-shadow: 0 4px 20px rgba(242,202,110,0.38);
    }
    .view { display: none; } .view.active { display: block; }

    /* ─── CARDS ─── */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 22px 24px; margin: 13px 0;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 36px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.07);
    }
    .card h3 {
      margin: 0 0 18px; font-size: 1.04rem; font-weight: 900;
      display: flex; align-items: center; gap: 9px; letter-spacing: .01em;
    }
    .card h3::before {
      content: ''; display: inline-block; width: 3px; height: 17px; border-radius: 2px; flex-shrink: 0;
      background: linear-gradient(180deg, var(--gold) 0%, rgba(242,202,110,0.18) 100%);
    }
    .card h3 small {
      color: var(--muted); font-weight: 400; font-size: .76rem;
      background: rgba(255,255,255,0.05); padding: 2px 9px;
      border-radius: 6px; border: 1px solid var(--border); letter-spacing: 0;
    }

    /* ─── FORM ─── */
    legend { font-weight: 800; padding: 0 6px; font-size: .87rem; color: var(--gold); letter-spacing: .04em; }
    fieldset { border: 1px solid var(--border); border-radius: 14px; margin: 0 0 12px; padding: 16px 18px; }
    label { display: inline-flex; align-items: center; gap: 6px; margin: 5px 10px 5px 0; font-size: .88rem; }
    input[type=number], input[type=text], select {
      background: rgba(0,0,0,0.3); color: var(--ink); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; font-size: .91rem; margin: 4px 6px 4px 0;
      outline: none; transition: border-color .15s, box-shadow .15s; font-family: inherit;
    }
    input[type=number] { width: 88px; } input[type=text] { width: 148px; }
    input[type=number]:focus, input[type=text]:focus, select:focus {
      border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow);
    }
    input[type=number]:disabled { opacity: .35; } select { min-width: 118px; }
    input[type=checkbox], input[type=radio] { accent-color: var(--gold); width: 15px; height: 15px; }
    .count-hint { color: var(--muted); font-size: .8rem; margin: 8px 0 0; line-height: 1.55; }
    #strengths .s-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px 10px; }
    #strengths .s-options label { margin: 0; }

    /* ─── SUBMIT ─── */
    .submit {
      width: 100%; padding: 16px; font-size: .98rem; font-weight: 900; letter-spacing: .06em;
      border: none; border-radius: 14px; cursor: pointer; margin-top: 10px;
      color: #14102a; background: linear-gradient(90deg, #f2ca6e 0%, #ffe08a 50%, #f2c25a 100%);
      box-shadow: 0 8px 30px rgba(242,202,110,0.42), 0 2px 8px rgba(0,0,0,0.35);
      transition: all .15s; font-family: inherit;
    }
    .submit:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(242,202,110,0.5); }
    .submit:active { transform: translateY(0); }
    .submit:disabled { filter: grayscale(.65) brightness(.65); cursor: not-allowed; transform: none; box-shadow: none; }

    /* ─── ANIMATIONS ─── */
    .report, .tarot { animation: fadeUp .5s cubic-bezier(.22,.68,0,1.15) both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    /* ─── HERO ─── */
    .hero { text-align: center; padding: 20px 0 12px; }
    .hero-sub { color: var(--gold); letter-spacing: .16em; font-size: .7rem; margin: 0 0 10px; text-transform: uppercase; opacity: .75; }
    .catch { font-size: 1.75rem; font-weight: 900; margin: 4px 0 10px; line-height: 1.32; }
    .catch .hl { color: var(--gold); }
    .sun { color: var(--muted); font-size: .86rem; }

    /* ─── RADAR ─── */
    .radar-card { text-align: center; }
    .radar-wrap { max-width: 340px; margin: 0 auto; }

    /* ─── AXIS ─── */
    .axis-grid { display: grid; gap: 8px; }
    .axis-card {
      background: rgba(255,255,255,0.025); border: 1px solid var(--border);
      border-radius: 13px; padding: 12px 15px; transition: border-color .2s;
    }
    .axis-card:hover { border-color: var(--border-hi); }
    .axis-head { display: flex; align-items: center; gap: 10px; }
    .axis-label { color: var(--muted); font-size: .78rem; min-width: 44px; letter-spacing: .02em; }
    .axis-pole { font-weight: 900; font-size: 1rem; flex: 1; }
    .badge { color: var(--gold); letter-spacing: 2px; font-size: .92rem; }
    .axis-foot { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .chip { font-size: .7rem; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
    .chip.muted { color: var(--muted); }
    .tag.conflict { font-size: .68rem; padding: 2px 9px; border-radius: 999px; background: rgba(255,80,80,0.1); border: 1px solid rgba(255,100,100,0.3); color: #ff9090; }

    /* ─── ZODIAC ─── */
    .zodiac-card .z-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
    .z-pill { font-size: .8rem; padding: 4px 12px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); }
    .z-blurb { font-size: .92rem; line-height: 1.68; }

    /* ─── STRENGTHS ─── */
    .s-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .s-chip {
      padding: 7px 13px; border-radius: 10px; font-size: .86rem; font-weight: 700;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      display: inline-flex; align-items: center; gap: 7px;
    }
    .s-chip i { font-style: normal; font-size: .67rem; padding: 1px 6px; border-radius: 5px; background: rgba(0,0,0,0.35); }
    .s-chip.gold { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 16px rgba(242,202,110,0.22); }
    .s-chip.silver { border-color: rgba(195,205,230,0.45); color: #d0d6ec; }
    .s-chip.bronze { color: var(--ink); }
    .s-chip.zero { opacity: .32; }

    /* ─── GAP / PT ─── */
    .gap-grid, .pt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pt-grid { grid-template-columns: repeat(2, 1fr); }
    .gap-col, .pt-col { background: rgba(0,0,0,0.18); border: 1px solid var(--border); border-radius: 13px; padding: 12px 14px; }
    .gap-col h4, .pt-col h4 { margin: 0 0 4px; font-size: .92rem; font-weight: 800; }
    .gap-hint { color: var(--muted); font-size: .7rem; margin: 0 0 7px; }
    .gap-col ul, .pt-col ul { margin: 0; padding-left: 16px; }
    .gap-col li, .pt-col li { font-size: .86rem; line-height: 1.65; }
    .gap-col li.empty, .pt-col li.empty { list-style: none; margin-left: -16px; color: var(--muted); }
    .g-confirm h4 { color: var(--confirm); } .g-hidden h4 { color: var(--hidden); } .g-nurtured h4 { color: var(--nurtured); }
    .pt-good h4 { color: var(--good); } .pt-bad h4 { color: var(--bad); }

    /* ─── COMPAT ─── */
    .person-block { margin-bottom: 10px; }
    .person-block > legend { color: var(--gold); }
    .big-percent { font-size: 3.8rem; font-weight: 900; color: var(--gold); line-height: 1; }
    .big-percent span { font-size: 1.3rem; font-weight: 700; }
    .compat-grid { display: grid; gap: 13px; }
    .compat-row { display: grid; grid-template-columns: 58px 1fr 42px; align-items: center; gap: 10px; }
    .cr-name { color: var(--muted); font-weight: 700; font-size: .86rem; }
    .cr-bar { height: 9px; background: rgba(0,0,0,0.32); border-radius: 999px; overflow: hidden; }
    .cr-bar i { display: block; height: 100%; background: linear-gradient(90deg, #f2ca6e, #ffe08a); border-radius: 999px; }
    .cr-verdict { text-align: center; font-weight: 900; font-size: .86rem; }
    .v-good { color: var(--good); } .v-bad { color: var(--bad); } .v-mid { color: var(--mid); }
    .cr-note { grid-column: 1 / -1; margin: 2px 0 0; color: var(--muted); font-size: .79rem; }

    /* ─── TAROT ─── */
    .tboard { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin: 12px 0 18px; }
    .tcard {
      border-radius: 12px; border: 1px solid var(--border); cursor: pointer;
      aspect-ratio: 2/3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 6px;
    }
    .tcard.back {
      background: repeating-linear-gradient(45deg, #1c1840 0px, #1c1840 7px, #231f50 7px, #231f50 14px);
      color: var(--gold); font-size: 1.3rem; transition: all .16s;
    }
    .tcard.back:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 24px rgba(242,202,110,0.28); }
    .tcard.back:disabled { opacity: .28; cursor: default; transform: none; }
    .tcard.face { background: rgba(255,255,255,0.05); cursor: default; text-align: center; }
    .tcard.face.rev { outline: 1px solid rgba(255,110,110,0.4); }
    .t-pos { font-size: .67rem; color: var(--gold); } .t-emoji { font-size: 1.7rem; }
    .t-name { font-weight: 800; font-size: .84rem; } .t-orient { font-size: .67rem; color: var(--muted); } .t-mean { font-size: .67rem; }
    .tresult { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 8px; }
    .picked-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; min-height: 20px; }
    .t-readings { margin: 0; padding-left: 18px; } .t-readings li { margin-bottom: 6px; font-size: .88rem; }

    /* ─── FORTUNE BARS ─── */
    .f-bars { display: grid; gap: 10px; margin-bottom: 8px; }
    .f-row { display: grid; grid-template-columns: 88px 1fr 36px; align-items: center; gap: 10px; }
    .f-name { font-size: .87rem; font-weight: 700; }
    .f-bar { height: 9px; background: rgba(0,0,0,0.3); border-radius: 999px; overflow: hidden; }
    .f-bar i { display: block; height: 100%; background: linear-gradient(90deg, #f2ca6e, #ffe08a); border-radius: 999px; }
    .f-score { text-align: right; font-size: .83rem; color: var(--gold); font-weight: 900; }
    .f-sub { margin: 20px 0 10px; font-size: .97rem; font-weight: 900; letter-spacing: .01em; }
    .f-sub small { color: var(--muted); font-weight: 400; font-size: .75rem; }
    .life-graph { margin: 0 0 8px; }
    .f-bar i.rel-high { background: linear-gradient(90deg, #5de8a4, #4dc48c); }
    .f-bar i.rel-low  { background: linear-gradient(90deg, #ff7676, #e05555); }

    /* ─── NARRATIVE ─── */
    .narrative .nv-period { color: var(--muted); font-size: .83rem; }
    .narrative p { margin: 0 0 13px; font-size: .93rem; color: var(--ink-dim); line-height: 1.72; }
    .narrative p:last-child { margin-bottom: 0; }
    .narrative p b { color: var(--gold); font-weight: 700; }
    .narrative .nv-head {
      font-weight: 900; margin-top: 22px; margin-bottom: 3px; font-size: .85rem;
      letter-spacing: .08em; text-transform: uppercase; opacity: .85;
    }
    .narrative .nv-head:first-child { margin-top: 0; }
    .narrative .nv-confirm b, .narrative .nv-confirm { color: var(--good); }
    .narrative .nv-cross { color: var(--nurtured); }
    .narrative .nv-hidden { color: var(--hidden); } .narrative .nv-nurtured { color: var(--nurtured); }
    .narrative .nv-foot { color: var(--muted); font-size: .8rem; font-style: italic; }
    .narrative .nv-caution { color: #ff8888; }
    .nv-src { font-size: .75rem; color: var(--muted); margin-left: 4px; }

    /* ─── CROSS INSIGHT ─── */
    .cross-insight {
      margin: 7px 0; padding: 11px 14px;
      background: rgba(196,124,255,0.05);
      border-left: 2px solid rgba(196,124,255,0.38); border-radius: 0 10px 10px 0;
    }
    .cross-insight p { margin: 4px 0 0; font-size: .89rem; }
    .cross-label { font-size: .71rem; color: var(--nurtured); font-weight: 900; letter-spacing: .06em; text-transform: uppercase; opacity: .8; }
    .cross-confirm {
      padding: 10px 14px; margin: 10px 0; font-size: .89rem;
      background: rgba(242,202,110,0.06); border-radius: 10px; border: 1px solid rgba(242,202,110,0.18);
    }
    .cross-confirm b { color: var(--gold); }

    /* ─── SAJU TABLE ─── */
    .saju-table { width: 100%; border-collapse: collapse; text-align: center; margin-bottom: 8px; }
    .saju-table th { color: var(--muted); font-size: .73rem; padding: 4px 0 10px; letter-spacing: .07em; font-weight: 600; }
    .saju-table td { padding: 5px 4px; }
    .saju-table .saju-gan { font-size: 1.25rem; font-weight: 900; letter-spacing: .04em; }
    .saju-table .saju-zhi { font-size: 1.1rem; font-weight: 800; }
    .saju-table .saju-el { font-size: .7rem; color: var(--muted); }
    .saju-table .saju-sep td { padding: 3px 0; }
    .saju-table .saju-sep td::before { content: ''; display: block; border-top: 1px solid rgba(255,255,255,0.06); }

    /* ─── OHAENG BARS ─── */
    .oh-bars { display: grid; gap: 8px; margin-bottom: 8px; }
    .oh-row { display: grid; grid-template-columns: 54px 1fr 22px; align-items: center; gap: 10px; }
    .oh-label { font-size: .79rem; color: var(--muted); font-weight: 700; }
    .oh-track { height: 7px; background: rgba(0,0,0,0.3); border-radius: 999px; overflow: hidden; }
    .oh-fill { height: 100%; border-radius: 999px; min-width: 4px; }
    .oh-cnt { font-size: .76rem; text-align: right; font-weight: 700; }

    /* ─── TEN GOD CHIPS ─── */
    .tg-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 6px; }
    .tg-chip {
      padding: 6px 13px; border-radius: 10px; font-size: .84rem; font-weight: 700;
      border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.03);
    }
    .tg-chip i { font-style: normal; font-size: .66rem; padding: 1px 6px; border-radius: 5px; background: rgba(0,0,0,0.38); }
    .tg-high { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 14px rgba(242,202,110,0.2); }
    .tg-mid { border-color: rgba(242,202,110,0.32); color: #e8d898; }
    .tg-low { color: var(--muted); } .tg-zero { opacity: .3; color: var(--muted); }
    .career-chip {
      display: inline-block; padding: 4px 10px; margin: 3px 3px 3px 0;
      border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); font-size: .82rem;
    }

    /* ─── RADAR TABLE ─── */
    .rat-table { display: flex; flex-direction: column; gap: 7px; margin: 8px 0 0; }
    .rat-row { padding: 10px 13px; border-radius: 11px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
    .rat-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .rat-label { font-weight: 900; font-size: .87rem; }
    .rat-pole { font-size: .78rem; padding: 2px 9px; border-radius: 6px; background: rgba(242,202,110,0.12); color: var(--gold); font-weight: 700; }
    .rat-pole.bal { background: rgba(255,255,255,0.06); color: var(--muted); }
    .rat-stars { font-size: .87rem; letter-spacing: .05em; color: var(--gold); margin-left: auto; }
    .rat-detail { font-size: .79rem; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; }
    .rat-sys { color: var(--confirm); font-weight: 700; }
    .rat-desc { flex: 1; min-width: 148px; }

    /* ─── ZIWEI CARD ─── */
    .ziwei-card { border-color: rgba(196,124,255,0.22); }
    .ziwei-card h3 { color: var(--nurtured); }
    .ziwei-card h3::before { background: linear-gradient(180deg, var(--nurtured), rgba(196,124,255,0.15)); }
    .zw-meta { display: flex; flex-wrap: wrap; gap: 7px; margin: 12px 0 4px; }
    .zw-pill { padding: 4px 12px; border-radius: 999px; background: rgba(196,124,255,0.08); border: 1px solid rgba(196,124,255,0.18); font-size: .81rem; }
    .zw-pill b { color: var(--nurtured); }
    .zw-star { padding: 14px 16px; border-radius: 13px; background: rgba(196,124,255,0.05); border: 1px solid rgba(196,124,255,0.1); margin-bottom: 12px; }
    .zw-star-head { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; flex-wrap: wrap; }
    .zw-star-name { font-size: 1.03rem; font-weight: 900; color: var(--nurtured); }
    .zw-star-nature { font-size: .77rem; color: var(--muted); padding: 2px 10px; background: rgba(255,255,255,0.05); border-radius: 999px; }
    .zw-meta-row { display: flex; gap: 8px; margin: 5px 0; font-size: .85rem; line-height: 1.55; }
    .zw-label { color: var(--muted); white-space: nowrap; min-width: 88px; font-weight: 700; }
    .zw-val { flex: 1; }
    .zw-shadow { color: var(--bad); opacity: .85; }
    .zw-keywords { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }

    /* ─── YEARLY FORTUNE ─── */
    .yf-period { padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .yf-period:last-child { border-bottom: none; padding-bottom: 0; }
    .yf-period-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .yf-period-title { font-weight: 900; font-size: .96rem; }
    .yf-period-sub { color: var(--muted); font-size: .78rem; }
    .yf-tg-badge {
      margin-left: auto; padding: 3px 12px; border-radius: 999px; font-size: .74rem;
      background: rgba(242,202,110,0.1); border: 1px solid rgba(242,202,110,0.22);
      color: var(--gold); font-weight: 800; white-space: nowrap;
    }
    .yf-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .yf-bar-wrap { flex: 1; height: 7px; background: rgba(0,0,0,0.3); border-radius: 999px; overflow: hidden; }
    .yf-bar-fill { height: 100%; border-radius: 999px; }
    .yf-bar-fill.yf-good { background: linear-gradient(90deg, #48d098, #5de8a4); }
    .yf-bar-fill.yf-mid  { background: linear-gradient(90deg, #d4a53e, #f2ca6e); }
    .yf-bar-fill.yf-low  { background: linear-gradient(90deg, #c43030, #ff7676); }
    .yf-score { font-size: .84rem; font-weight: 900; color: var(--gold); min-width: 26px; text-align: right; }
    .yf-climate {
      font-size: .85rem; margin: 0 0 10px; padding: 9px 13px; line-height: 1.65;
      background: rgba(242,202,110,0.05); border-left: 2px solid rgba(242,202,110,0.32);
      border-radius: 0 9px 9px 0; color: var(--ink-dim);
    }
    .yf-climate b { color: var(--gold); }
    .yf-text { font-size: .89rem; margin: 0; line-height: 1.78; color: var(--ink-dim); }
    .yf-aspects { display: grid; gap: 8px; margin: 13px 0 0; }
    .yf-aspect {
      display: grid; grid-template-columns: 84px 1fr; gap: 10px; align-items: start;
      padding: 9px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    }
    .yf-aspect-label { font-size: .8rem; font-weight: 800; color: var(--gold); white-space: nowrap; }
    .yf-aspect-text { font-size: .85rem; line-height: 1.62; color: var(--ink-dim); }
    .yf-advice {
      font-size: .87rem; margin: 13px 0 0; padding: 11px 14px; line-height: 1.68;
      background: rgba(93,232,164,0.06); border: 1px solid rgba(93,232,164,0.18);
      border-radius: 10px; color: var(--ink-dim);
    }
    .yf-advice b { color: var(--good); font-weight: 800; }

    /* ─── SYNTHESIS ─── */
    .synthesis-card { border-color: rgba(93,232,164,0.2); }
    .synthesis-card h3 { color: var(--good); }
    .synthesis-card h3::before { background: linear-gradient(180deg, var(--good), rgba(93,232,164,0.15)); }

    /* ─── MISC ─── */
    .note { color: #ffb86a; font-size: .8rem; line-height: 1.55; }
    .disclaimer { color: var(--muted); font-size: .78rem; text-align: center; margin-top: 22px; line-height: 1.65; }
    .actions { text-align: center; margin-top: 22px; }
    .ghost {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 11px 26px; border-radius: 999px; cursor: pointer; font-size: .9rem;
      transition: all .18s; font-family: inherit;
    }
    .ghost:hover { border-color: var(--border-hi); color: var(--ink); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 560px) {
      .wrap { padding: 22px 14px 80px; }
      .logo { font-size: 2.3rem; letter-spacing: .16em; }
      .catch { font-size: 1.4rem; }
      .gap-grid { grid-template-columns: 1fr; }
      #strengths .s-options { grid-template-columns: repeat(2, 1fr); }
      .tboard { grid-template-columns: repeat(4, 1fr); }
      .card { padding: 18px 16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <h1 class="logo">PENTA</h1>
      <p class="tagline">사주 · MBTI · 혈액형 · 별자리 · 타로 — 5개 렌즈로 비춘 나</p>
    </header>

    <nav class="nav">
      <button type="button" data-view="profile" class="active">🔮 프로파일</button>
      <button type="button" data-view="compat">💞 궁합</button>
    </nav>

    <!-- ===== 프로파일 ===== -->
    <div class="view active" id="view-profile">
      <form id="penta-form" class="card">
        <fieldset>
          <legend>생년월일시</legend>
          <div>
            <input type="number" id="year" placeholder="년(1990)" required />
            <input type="number" id="month" placeholder="월" min="1" max="12" required />
            <input type="number" id="day" placeholder="일" min="1" max="31" required />
            <input type="number" id="hour" placeholder="시(0-23)" min="0" max="23" />
          </div>
          <label><input type="checkbox" id="hourUnknown" /> 태어난 시간 모름</label>
          <div style="margin-top:8px">
            <label><input type="radio" name="cal" value="solar" checked /> 양력</label>
            <label><input type="radio" name="cal" value="lunar" /> 음력</label> &nbsp;
            <label><input type="radio" name="gender" value="male" checked /> 남</label>
            <label><input type="radio" name="gender" value="female" /> 여</label>
          </div>
        </fieldset>
        <fieldset>
          <legend>이름 · MBTI · 혈액형</legend>
          <label>이름 <input type="text" id="name" placeholder="홍길동 (한글)" maxlength="10" /></label>
          <label>MBTI <select id="mbti" required></select></label>
          <label>혈액형 <select id="blood"><option>A</option><option>B</option><option>O</option><option>AB</option></select></label>
          <p class="count-hint">이름을 한글로 적으면 성명학(소리오행) 풀이가 추가돼요.</p>
        </fieldset>
        <fieldset>
          <legend>손가락 비율 (2D:4D)</legend>
          <label>검지 vs 약지
            <select id="digit">
              <option value="">선택 안 함</option>
              <option value="ring">약지(넷째)가 더 길다</option>
              <option value="similar">비슷하다</option>
              <option value="index">검지(둘째)가 더 길다</option>
            </select>
          </label>
          <p class="count-hint">손바닥을 펴고 검지(둘째)와 약지(넷째) 길이를 비교하세요. 태내 호르몬 노출 추정 지표예요.</p>
        </fieldset>
        <button type="submit" class="submit" id="submit-btn">✦ 분석 시작 · 타로 뽑기</button>
      </form>
      <div id="result"></div>
    </div>

    <!-- ===== 궁합 ===== -->
    <div class="view" id="view-compat">
      <form id="compat-form" class="card">
        <fieldset class="person-block">
          <legend>나 (A)</legend>
          <div>
            <input type="number" class="c-year" placeholder="년" required />
            <input type="number" class="c-month" placeholder="월" min="1" max="12" required />
            <input type="number" class="c-day" placeholder="일" min="1" max="31" required />
          </div>
          <label>MBTI <select class="c-mbti"></select></label>
          <label>혈액형 <select class="c-blood"><option>A</option><option>B</option><option>O</option><option>AB</option></select></label>
        </fieldset>
        <fieldset class="person-block">
          <legend>상대 (B)</legend>
          <div>
            <input type="number" class="c-year" placeholder="년" required />
            <input type="number" class="c-month" placeholder="월" min="1" max="12" required />
            <input type="number" class="c-day" placeholder="일" min="1" max="31" required />
          </div>
          <label>MBTI <select class="c-mbti"></select></label>
          <label>혈액형 <select class="c-blood"><option>A</option><option>B</option><option>O</option><option>AB</option></select></label>
        </fieldset>
        <button type="submit" class="submit">💞 궁합 보기</button>
      </form>
      <div id="compat-result"></div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
